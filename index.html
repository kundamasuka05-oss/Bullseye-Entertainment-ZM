
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bullseye Entertainment ZM</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Exo 2"', 'sans-serif'],
              display: ['"Orbitron"', 'sans-serif'],
            },
            colors: {
              bullseye: {
                base: '#02030A',
                surface: '#0d121f',
                red: '#FF003C',
                blue: '#00AFFF',
                purple: '#9A00FF',
              }
            },
            boxShadow: {
              'neon-red': '0 0 10px rgba(255, 0, 60, 0.5), 0 0 20px rgba(255, 0, 60, 0.3)',
              'neon-blue': '0 0 10px rgba(0, 175, 255, 0.5), 0 0 20px rgba(0, 175, 255, 0.3)',
              'glass': '0 8px 32px 0 rgba(0, 0, 0, 0.37)',
            }
          }
        }
      }
    </script>
    <style>
      body { background-color: #02030A; color: #e5e7eb; margin: 0; overflow-x: hidden; }
      #root:empty { height: 100vh; width: 100vw; background: radial-gradient(circle at center, #0d121f 0%, #02030A 100%); }
      .glass-panel { background: rgba(13, 18, 31, 0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
      
      .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #FF003C; border-radius: 10px; }
    </style>

  <link rel="stylesheet" href="/index.css">
</head>
  <body class="antialiased selection:bg-bullseye-red selection:text-white">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
